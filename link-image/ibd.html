<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IBD Quick Access Figures</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a2233;
      font-size: 14px;
      padding: 20px 16px 48px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 13px;
      color: #1a6fb5;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a2233;
    }
    .subtitle {
      font-size: 13px;
      color: #6b7a99;
      margin-bottom: 24px;
    }

    /* Divider */
    hr { border: none; border-top: 1px solid #dde3ec; margin: 28px 0; }

    /* Section headers */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #6b7a99;
      margin-bottom: 14px;
    }

    /* Image cards */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 8px;
    }

    .image-card {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      overflow: hidden;
    }

    .image-card img {
      width: 100%;
      display: block;
    }

    .image-card .card-body {
      padding: 10px 12px 12px;
    }

    .image-card .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a2233;
      margin-bottom: 2px;
    }

    .image-card .card-date {
      font-size: 11.5px;
      color: #9aa3b8;
      margin-bottom: 6px;
    }

    .image-card a {
      font-size: 12px;
      color: #1a6fb5;
      text-decoration: none;
    }
    .image-card a:hover { text-decoration: underline; }

    /* iframe embed */
    .table-wrapper {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      overflow: hidden;
    }

    .table-wrapper iframe {
      width: 100%;
      border: none;
      display: block;
      /* height set by JS */
      min-height: 600px;
    }

    @media (max-width: 600px) {
      h1 { font-size: 17px; }
      .image-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <a class="back-link" href="javascript:history.back()">← Back to Figures</a>

  <h1>IBD Quick Access Figures</h1>
  <p class="subtitle">Visual references and figures</p>

  <hr>

  <div class="section-title">Algorithm Figures</div>

  <div class="image-grid">
    <div class="image-card">
      <img src="https://raw.githubusercontent.com/Poolas10/poolas10.github.io/refs/heads/main/Images/ACGUC.jpg" alt="ACG UC Algorithm">
      <div class="card-body">
        <div class="card-title">ACG UC</div>
        <div class="card-date">June 2025</div>
        <a href="https://journals.lww.com/ajg/fulltext/2025/06000/acg_clinical_guideline_update__ulcerative_colitis.13.aspx" target="_blank">Image Source — 2025 ACG UC Management ↗</a>
      </div>
    </div>

    <div class="image-card">
      <img src="https://raw.githubusercontent.com/Poolas10/poolas10.github.io/refs/heads/main/Images/acgcrohns.jpg" alt="ACG Crohn's Algorithm">
      <div class="card-body">
        <div class="card-title">ACG Crohn's</div>
        <div class="card-date">June 2025</div>
        <a href="https://journals.lww.com/ajg/fulltext/2025/06000/acg_clinical_guideline__management_of_crohn_s.14.aspx" target="_blank">Image Source — 2025 ACG Crohn's Management ↗</a>
      </div>
    </div>
  </div>

  <hr>

  <div class="section-title">AGA &amp; ACG Guideline Recommendations Table</div>

  <div class="table-wrapper">
    <iframe
      id="guidelinesFrame"
      src="https://poolas10.github.io/guidelines/ibd-table2.html"
      scrolling="no"
      title="IBD Guidelines Table">
    </iframe>
  </div>

  <script>
    // Auto-resize iframe to fit its content
    const frame = document.getElementById('guidelinesFrame');
    function resizeFrame() {
      try {
        const h = frame.contentDocument.documentElement.scrollHeight;
        if (h > 200) frame.style.height = h + 'px';
      } catch(e) {
        // cross-origin fallback — set a generous fixed height
        frame.style.height = '2400px';
      }
    }
    frame.addEventListener('load', resizeFrame);
    window.addEventListener('resize', resizeFrame);
  </script>

</body>
</html>
