<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quick Access Calculators</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #ddeef7;
      --ink: #12202e;
      --muted: #3a5a72;
      --accent: #1a6fa8;
      --rule: #a8cfe0;
      --card-bg: #c8e4f2;
      --green: #1a7a4a;
      --green-bg: #d4f0e2;
      --yellow: #7a5c1a;
      --yellow-bg: #fdf0d0;
      --red: #7a1a1a;
      --red-bg: #f5d4d4;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 720px;
      padding: 60px 24px 0;
      text-align: center;
      animation: fadeUp .7s ease both;
    }

    header h1 {
      font-family: 'Lora', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    header p.subtitle {
      margin-top: 10px;
      font-size: 1rem;
      color: var(--muted);
      font-style: italic;
      font-family: 'Lora', serif;
    }

    .rule {
      width: 100%;
      max-width: 720px;
      padding: 0 24px;
      margin: 32px 0;
      animation: fadeUp .7s .1s ease both;
    }

    .rule hr { border: none; border-top: 1px solid var(--rule); }

    .back-link {
      width: 100%;
      max-width: 720px;
      padding: 0 24px;
      margin-bottom: 24px;
      animation: fadeUp .7s .1s ease both;
    }

    .back-link a {
      font-size: .9rem;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .15s;
    }

    .back-link a:hover { border-bottom-color: var(--accent); }

    /* ── Accordion ── */
    .calculators {
      width: 100%;
      max-width: 720px;
      padding: 0 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeUp .7s .2s ease both;
    }

    .accordion {
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
    }

    .accordion-header {
      width: 100%;
      background: var(--card-bg);
      border: none;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      text-align: left;
      transition: background .2s;
    }

    .accordion-header:hover { background: #b8d8ea; }

    .accordion-header .acc-title {
      font-family: 'Lora', serif;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--ink);
    }

    .accordion-header .acc-subtitle {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .accordion-header .chevron {
      font-size: 1.2rem;
      color: var(--accent);
      transition: transform .3s;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .accordion-header.open .chevron { transform: rotate(180deg); }

    .accordion-body {
      display: none;
      padding: 24px;
      background: #fff;
      border-top: 1px solid var(--rule);
    }

    .accordion-body.open { display: block; }

    /* ── Calculator inputs ── */
    .calc-input-group {
      margin-bottom: 16px;
    }

    .calc-input-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }

    .calc-input-group .hint {
      font-size: .78rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 4px;
    }

    .calc-input-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--rule);
      border-radius: 4px;
      background: var(--cream);
      color: var(--ink);
      font-family: 'Source Sans 3', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .calc-input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,111,168,.1);
    }

    .calc-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background .2s, transform .15s;
    }

    .calc-btn:hover {
      background: #155d8e;
      transform: translateY(-1px);
    }

    .calc-result {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid var(--rule);
    }

    .calc-result .result-label {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .calc-result .result-score {
      font-family: 'Lora', serif;
      font-size: 2.2rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .calc-result .result-interp {
      font-size: .95rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .calc-result .result-detail {
      font-size: .88rem;
      line-height: 1.6;
    }

    .formula-note {
      margin-top: 20px;
      padding: 14px 16px;
      background: var(--cream);
      border-radius: 4px;
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .formula-note strong { color: var(--ink); }

    .formula-note a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .15s;
    }

    .formula-note a:hover { border-bottom-color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Quick Access Calculators</h1>
    <p class="subtitle">Just Notes for Myself</p>
  </header>

  <div class="rule"><hr /></div>

  <div class="back-link">
    <a href="https://poolas10.github.io">← Back to Home</a>
  </div>

  <div class="calculators">

    <!-- ── FIB-4 CALCULATOR ── -->
    <div class="accordion">
      <button class="accordion-header" onclick="toggleAccordion(this)">
        <div>
          <div class="acc-title">FIB-4 Calculator</div>
          <div class="acc-subtitle">Liver Fibrosis Index</div>
        </div>
        <span class="chevron">▾</span>
      </button>
      <div class="accordion-body">

        <div class="calc-input-group">
          <label>Age</label>
          <div class="hint">years</div>
          <input type="number" id="fib4-age" placeholder="e.g. 55" min="1" />
        </div>
        <div class="calc-input-group">
          <label>AST</label>
          <div class="hint">U/L</div>
          <input type="number" id="fib4-ast" placeholder="e.g. 40" min="1" />
        </div>
        <div class="calc-input-group">
          <label>ALT</label>
          <div class="hint">U/L</div>
          <input type="number" id="fib4-alt" placeholder="e.g. 35" min="1" />
        </div>
        <div class="calc-input-group">
          <label>Platelet Count</label>
          <div class="hint">10⁹/L — enter 150 for 150,000/µL</div>
          <input type="number" id="fib4-plt" placeholder="e.g. 150" min="1" />
        </div>

        <button class="calc-btn" onclick="calcFib4()">Calculate FIB-4</button>

        <div class="calc-result" id="fib4-result">
          <div class="result-label">FIB-4 Score</div>
          <div class="result-score" id="fib4-score"></div>
          <div class="result-interp" id="fib4-interp"></div>
          <div class="result-detail" id="fib4-detail"></div>
        </div>

        <div class="formula-note">
          <strong>Formula:</strong> FIB-4 = (Age × AST) ÷ (Platelets × √ALT)<br><br>
          <strong>Cutoffs:</strong> &lt;1.30 Low risk · 1.30–2.67 Indeterminate · &gt;2.67 High risk<br><br>
          Reference: <a href="https://www.aasld.org/practice-guidelines" target="_blank">AASLD Guidelines</a>
        </div>

      </div>
    </div>

    <!-- ── ADD MORE CALCULATORS BELOW BY COPYING THE ACCORDION BLOCK ABOVE ── -->

  </div>

  <script>
    function toggleAccordion(btn) {
      const body = btn.nextElementSibling;
      const isOpen = body.classList.contains('open');
      // Close all
      document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
      document.querySelectorAll('.accordion-header').forEach(b => b.classList.remove('open'));
      // Open clicked if it was closed
      if (!isOpen) {
        body.classList.add('open');
        btn.classList.add('open');
      }
    }

    function calcFib4() {
      const age = parseFloat(document.getElementById('fib4-age').value);
      const ast = parseFloat(document.getElementById('fib4-ast').value);
      const alt = parseFloat(document.getElementById('fib4-alt').value);
      const plt = parseFloat(document.getElementById('fib4-plt').value);
      if (!age || !ast || !alt || !plt) return;

      const fib4 = (age * ast) / (plt * Math.sqrt(alt));
      const score = fib4.toFixed(2);

      const resultEl = document.getElementById('fib4-result');
      document.getElementById('fib4-score').textContent = score;
      resultEl.style.display = 'block';

      if (fib4 < 1.30) {
        resultEl.style.background = '#d4f0e2';
        resultEl.style.borderColor = '#a8d8bc';
        document.getElementById('fib4-score').style.color = '#1a7a4a';
        document.getElementById('fib4-interp').style.color = '#1a7a4a';
        document.getElementById('fib4-interp').textContent = 'Low Risk';
        document.getElementById('fib4-detail').textContent = 'FIB-4 < 1.30 suggests low risk of advanced fibrosis (F0–F1). Routine follow-up is generally appropriate.';
      } else if (fib4 <= 2.67) {
        resultEl.style.background = '#fdf0d0';
        resultEl.style.borderColor = '#e8d4a0';
        document.getElementById('fib4-score').style.color = '#7a5c1a';
        document.getElementById('fib4-interp').style.color = '#7a5c1a';
        document.getElementById('fib4-interp').textContent = 'Indeterminate';
        document.getElementById('fib4-detail').textContent = 'FIB-4 between 1.30 and 2.67 is indeterminate. Consider additional evaluation such as elastography or liver biopsy.';
      } else {
        resultEl.style.background = '#f5d4d4';
        resultEl.style.borderColor = '#d4a8a8';
        document.getElementById('fib4-score').style.color = '#7a1a1a';
        document.getElementById('fib4-interp').style.color = '#7a1a1a';
        document.getElementById('fib4-interp').textContent = 'High Risk';
        document.getElementById('fib4-detail').textContent = 'FIB-4 > 2.67 suggests high risk of advanced fibrosis (F3–F4). Referral to hepatology and further evaluation is recommended.';
      }
    }
  </script>

</body>
</html>
