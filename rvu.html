<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GI wRVU Calculator</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0d0f1a; height: 100%; }
    body { -webkit-tap-highlight-color: transparent; }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: #2d3348; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #6366f1; cursor: pointer; }
    input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #6366f1; cursor: pointer; border: none; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef } = React;
    const CF = 33.40;

const isAddOn  = (cpt) => cpt.startsWith("+");
const isEM     = (cpt) => cpt.startsWith("99");
const isExempt = (cpt) => isAddOn(cpt) || isEM(cpt);

const PROCEDURES = {
  colonoscopy: { label:"Colonoscopy", short:"Colon", color:"#10b981", codes:[
    {cpt:"45378",desc:"Diagnostic colonoscopy",wRVU:3.18,note:""},
    {cpt:"45380",desc:"Colonoscopy with biopsy",wRVU:3.47,note:""},
    {cpt:"45381",desc:"Colonoscopy with submucosal injection",wRVU:3.76,note:""},
    {cpt:"45382",desc:"Colonoscopy with control of bleeding",wRVU:3.76,note:""},
    {cpt:"45384",desc:"Colonoscopy with removal, hot biopsy forceps",wRVU:3.76,note:""},
    {cpt:"45385",desc:"Colonoscopy with polypectomy (snare)",wRVU:4.46,note:""},
    {cpt:"45386",desc:"Colonoscopy with balloon dilation",wRVU:3.76,note:""},
    {cpt:"45388",desc:"Colonoscopy with ablation of lesion(s)",wRVU:3.76,note:""},
    {cpt:"45390",desc:"Colonoscopy with EMR",wRVU:5.32,note:""},
    {cpt:"45398",desc:"Colonoscopy with band ligation",wRVU:3.76,note:""},
  ]},
  egd: { label:"EGD / Upper GI", short:"EGD", color:"#6366f1", codes:[
    {cpt:"43235",desc:"EGD, diagnostic",wRVU:2.04,note:""},
    {cpt:"43239",desc:"EGD with biopsy",wRVU:2.33,note:""},
    {cpt:"43240",desc:"EGD with drainage of cyst(s)",wRVU:3.41,note:""},
    {cpt:"43241",desc:"EGD with transendoscopic tube placement",wRVU:2.33,note:""},
    {cpt:"43245",desc:"EGD with dilation of gastric outlet",wRVU:2.83,note:""},
    {cpt:"43246",desc:"EGD with PEG placement",wRVU:3.56,note:""},
    {cpt:"43247",desc:"EGD with removal of foreign body",wRVU:2.83,note:""},
    {cpt:"43248",desc:"EGD with dilation over guidewire",wRVU:2.33,note:""},
    {cpt:"43249",desc:"EGD with balloon dilation <30mm",wRVU:2.33,note:""},
    {cpt:"43250",desc:"EGD with removal tumor/polyp, hot biopsy",wRVU:2.33,note:""},
    {cpt:"43251",desc:"EGD with removal tumor/polyp, snare",wRVU:2.83,note:""},
    {cpt:"43254",desc:"EGD with EMR",wRVU:4.23,note:""},
    {cpt:"43255",desc:"EGD with control of bleeding",wRVU:3.41,note:""},
    {cpt:"43266",desc:"EGD with endoscopic stent placement",wRVU:3.92,note:""},
    {cpt:"43270",desc:"EGD with ablation of lesion(s)",wRVU:4.01,note:""},
    {cpt:"43450",desc:"Dilation of Esophagus, bougie",wRVU:1.50,note:""},
    {cpt:"43497",desc:"POEM",wRVU:18.00,note:"Advanced procedure"},
  ]},
  ercp: { label:"ERCP", short:"ERCP", color:"#f59e0b", codes:[
    {cpt:"43260",desc:"ERCP, diagnostic",wRVU:5.70,note:""},
    {cpt:"43261",desc:"ERCP with biopsy",wRVU:6.15,note:""},
    {cpt:"43262",desc:"ERCP with sphincterotomy",wRVU:6.34,note:"⚠️ Bundled if stent placed same duct"},
    {cpt:"43263",desc:"ERCP with sphincter of Oddi manometry",wRVU:6.50,note:""},
    {cpt:"43264",desc:"ERCP with calculi removal",wRVU:6.63,note:"⚠️ Needs modifier -59 with 43274–43276"},
    {cpt:"43265",desc:"ERCP with lithotripsy",wRVU:7.93,note:""},
    {cpt:"43274",desc:"ERCP with stent placement (incl. sphincterotomy)",wRVU:8.27,note:"✓ Sphincterotomy included"},
    {cpt:"43275",desc:"ERCP with stent/foreign body removal",wRVU:6.86,note:""},
    {cpt:"43276",desc:"ERCP with stent exchange (incl. sphincterotomy)",wRVU:8.84,note:"✓ Sphincterotomy included"},
    {cpt:"43277",desc:"ERCP with balloon dilation duct/ampulla",wRVU:6.90,note:""},
    {cpt:"43278",desc:"ERCP with ablation of tumor/polyp/lesion",wRVU:7.92,note:""},
    {cpt:"+43273",desc:"Cholangioscopy (add-on)",wRVU:2.24,note:"➕ Add-on — exempt from procedure reduction"},
  ]},
  eus: { label:"EUS", short:"EUS", color:"#ec4899", codes:[
    {cpt:"43237",desc:"EUS, esophagus",wRVU:2.83,note:""},
    {cpt:"43238",desc:"EUS with FNA/B, esophagus",wRVU:3.41,note:""},
    {cpt:"43242",desc:"EUS with FNA/B, EGD",wRVU:4.23,note:""},
    {cpt:"43253",desc:"EUS with fiducial placement, EGD",wRVU:4.61,note:""},
    {cpt:"43259",desc:"EUS, duodenum/jejunum",wRVU:3.94,note:""},
    {cpt:"43232",desc:"EUS with transendoscopic drainage",wRVU:4.61,note:""},
  ]},
  smallbowel: { label:"Small Bowel / Capsule", short:"SB/Cap", color:"#14b8a6", codes:[
    {cpt:"44360",desc:"Small bowel endoscopy, diagnostic",wRVU:4.04,note:""},
    {cpt:"44361",desc:"Small bowel endoscopy with biopsy",wRVU:4.35,note:""},
    {cpt:"44364",desc:"Small bowel endoscopy with polypectomy",wRVU:4.89,note:""},
    {cpt:"44366",desc:"Small bowel endoscopy with bleeding control",wRVU:5.10,note:""},
    {cpt:"44369",desc:"Small bowel endoscopy with ablation",wRVU:5.10,note:""},
    {cpt:"91110",desc:"Capsule endoscopy, small bowel",wRVU:1.79,note:""},
    {cpt:"91111",desc:"Capsule endoscopy, esophagus",wRVU:1.30,note:""},
    {cpt:"91113",desc:"Capsule endoscopy, colon",wRVU:2.26,note:""},
  ]},
  office: { label:"Office / E&M", short:"Office", color:"#94a3b8", codes:[
    {cpt:"99202",desc:"New patient, straightforward",wRVU:0.93,note:"Exempt — mod-25"},
    {cpt:"99203",desc:"New patient, low complexity",wRVU:1.60,note:"Exempt — mod-25"},
    {cpt:"99204",desc:"New patient, moderate complexity",wRVU:2.60,note:"Exempt — mod-25"},
    {cpt:"99205",desc:"New patient, high complexity",wRVU:3.50,note:"Exempt — mod-25"},
    {cpt:"99212",desc:"Established patient, minimal",wRVU:0.70,note:"Exempt — mod-25"},
    {cpt:"99213",desc:"Established patient, low complexity",wRVU:1.30,note:"Exempt — mod-25"},
    {cpt:"99214",desc:"Established patient, moderate complexity",wRVU:1.92,note:"Exempt — mod-25"},
    {cpt:"99215",desc:"Established patient, high complexity",wRVU:2.80,note:"Exempt — mod-25"},
  ]},
  hospital: { label:"Hospital / Inpatient", short:"Inpt", color:"#e879f9", codes:[
    {cpt:"99221",desc:"Initial hospital care, straightforward/low",wRVU:1.92,note:"Exempt — initial encounter"},
    {cpt:"99222",desc:"Initial hospital care, moderate complexity",wRVU:2.61,note:"Exempt — initial encounter"},
    {cpt:"99223",desc:"Initial hospital care, high complexity",wRVU:3.86,note:"Exempt — initial encounter"},
    {cpt:"99231",desc:"Subsequent hospital care, low",wRVU:1.05,note:"Exempt — subsequent encounter"},
    {cpt:"99232",desc:"Subsequent hospital care, moderate",wRVU:1.49,note:"Exempt — subsequent encounter"},
    {cpt:"99233",desc:"Subsequent hospital care, high",wRVU:2.00,note:"Exempt — subsequent encounter"},
    {cpt:"99238",desc:"Hospital discharge, ≤30 min",wRVU:1.28,note:"Exempt — discharge"},
    {cpt:"99239",desc:"Hospital discharge, >30 min",wRVU:1.90,note:"Exempt — discharge"},
  ]},
  consult: { label:"Consults (Non-Medicare)", short:"Consult", color:"#f97316", codes:[
    {cpt:"99242",desc:"Office consult, straightforward",wRVU:1.60,note:"⚠️ Not covered by Medicare"},
    {cpt:"99243",desc:"Office consult, low complexity",wRVU:2.30,note:"⚠️ Not covered by Medicare"},
    {cpt:"99244",desc:"Office consult, moderate complexity",wRVU:3.40,note:"⚠️ Not covered by Medicare"},
    {cpt:"99245",desc:"Office consult, high complexity",wRVU:4.20,note:"⚠️ Not covered by Medicare"},
    {cpt:"99252",desc:"Inpatient consult, straightforward",wRVU:1.50,note:"⚠️ Not covered by Medicare"},
    {cpt:"99253",desc:"Inpatient consult, low complexity",wRVU:2.27,note:"⚠️ Not covered by Medicare"},
    {cpt:"99254",desc:"Inpatient consult, moderate complexity",wRVU:3.40,note:"⚠️ Not covered by Medicare"},
    {cpt:"99255",desc:"Inpatient consult, high complexity",wRVU:4.50,note:"⚠️ Not covered by Medicare"},
  ]},
};

const ALL_CODES = Object.entries(PROCEDURES).flatMap(([cat,{label,color,codes}]) =>
  codes.map(c => ({...c, cat, catLabel:label, color}))
);

function computeReduction(codes) {
  const nonExempt = [...codes.filter(c=>!isExempt(c.cpt))].sort((a,b)=>b.wRVU-a.wRVU);
  return codes.map(code => {
    if (isExempt(code.cpt)) return {...code, multiplier:1.0, role: isAddOn(code.cpt)?"add-on":"e&m"};
    const rank = nonExempt.findIndex(c=>c.cpt===code.cpt);
    return {...code, multiplier: rank===0?1.0:0.5, role: rank===0?"primary":"secondary"};
  });
}

function caseEffectiveRVU(codes) {
  return computeReduction(codes).reduce((s,c)=>s+c.wRVU*c.multiplier, 0);
}

const ROLE_LABELS = {
  primary:   {label:"Primary",      color:"#10b981", bg:"#10b98120"},
  secondary: {label:"50% reduction",color:"#f59e0b", bg:"#f59e0b18"},
  "add-on":  {label:"Add-on",       color:"#6366f1", bg:"#6366f118"},
  "e&m":     {label:"E&M (mod-25)", color:"#94a3b8", bg:"#94a3b818"},
};

let nextId = 1;

// ── MAIN APP ──────────────────────────────────────────────────────────────
function App() {
  // view: "calc" | "daylog"
  const [view, setView]               = useState("calc");
  const [selected, setSelected]       = useState([]);
  const [activeTab, setActiveTab]     = useState("colonoscopy");
  const [compRate, setCompRate]       = useState(61);
  const [search, setSearch]           = useState("");
  const [showBreakdown, setShowBreakdown] = useState(false);
  const [showSettings, setShowSettings]   = useState(false);
  const [dayLog, setDayLog]           = useState([]); // [{id, label, codes:[...]}]
  const [caseLabel, setCaseLabel]     = useState("");
  const [confirmClear, setConfirmClear] = useState(false);

  const filteredCodes = useMemo(() => {
    if (!search) return null;
    const q = search.toLowerCase();
    return ALL_CODES.filter(c => c.cpt.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q));
  }, [search]);

  const toggle = (cpt) =>
    setSelected(prev => prev.includes(cpt) ? prev.filter(c=>c!==cpt) : [...prev, cpt]);

  const selectedDetails = useMemo(
    () => selected.map(cpt => ALL_CODES.find(c=>c.cpt===cpt)).filter(Boolean),
    [selected]
  );

  const annotated       = useMemo(() => computeReduction(selectedDetails), [selectedDetails]);
  const totalRaw        = selectedDetails.reduce((s,c)=>s+c.wRVU, 0);
  const totalEffective  = annotated.reduce((s,c)=>s+c.wRVU*c.multiplier, 0);
  const hasReduction    = (totalRaw - totalEffective) > 0.001;
  const currentDisplay  = hasReduction ? totalEffective : totalRaw;

  // Day totals
  const dayTotalEffective = dayLog.reduce((s,cas) => s + caseEffectiveRVU(cas.codes), 0);
  const dayTotalRaw       = dayLog.reduce((s,cas) => s + cas.codes.reduce((ss,c)=>ss+c.wRVU,0), 0);

  const addToDay = () => {
    if (selectedDetails.length === 0) return;
    const label = caseLabel.trim() || `Case ${dayLog.length + 1}`;
    setDayLog(prev => [...prev, { id: nextId++, label, codes: [...selectedDetails] }]);
    setSelected([]);
    setCaseLabel("");
    setShowBreakdown(false);
  };

  const removeCase = (id) => setDayLog(prev => prev.filter(c=>c.id!==id));

  const resetDay = () => { setDayLog([]); setConfirmClear(false); };

  const fmt = (n) => "$" + n.toLocaleString("en-US", {maximumFractionDigits:0});

  const displayCodes = filteredCodes ||
    PROCEDURES[activeTab]?.codes.map(c => ({...c, cat:activeTab, catLabel:PROCEDURES[activeTab].label, color:PROCEDURES[activeTab].color})) || [];

  // ── CALC VIEW ─────────────────────────────────────────────────────────
  const CalcView = () => (
    <div style={{paddingBottom:200}}>
      {/* Search */}
      <div style={{padding:"10px 12px 0", position:"relative"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search CPT code or procedure…"
          style={{width:"100%", background:"#1a1d2e", border:"1px solid #2d3348", borderRadius:10,
            padding:"9px 36px 9px 12px", color:"#e2e8f0", fontSize:14, outline:"none"}} />
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:20,top:"50%",transform:"translateY(-50%)",
          background:"none",border:"none",color:"#64748b",fontSize:20,cursor:"pointer",padding:0,lineHeight:1}}>×</button>}
      </div>

      {/* Tabs */}
      {!search && (
        <div style={{display:"flex",overflowX:"auto",gap:6,padding:"10px 12px 6px"}}>
          {Object.entries(PROCEDURES).map(([key,{short,color}]) => {
            const active = activeTab===key;
            return <button key={key} onClick={()=>setActiveTab(key)} style={{
              flexShrink:0, background:active?color+"25":"#1a1d2e",
              border:`1.5px solid ${active?color:"#2d3348"}`, color:active?color:"#64748b",
              borderRadius:20, padding:"5px 13px", fontSize:12, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap"
            }}>{short}</button>;
          })}
        </div>
      )}

      {/* Code list */}
      <div style={{padding:"4px 12px 0"}}>
        {search && filteredCodes?.length===0 && (
          <div style={{padding:28,textAlign:"center",color:"#475569",fontSize:14}}>No results for "{search}"</div>
        )}
        {displayCodes.map(code => {
          const sel = selected.includes(code.cpt);
          const c = code.color;
          return (
            <div key={code.cpt} onClick={()=>toggle(code.cpt)} style={{
              display:"flex", alignItems:"center", gap:10, padding:"11px 12px", marginBottom:6,
              background:sel?c+"14":"#13162a", borderRadius:10,
              border:`1.5px solid ${sel?c+"55":"#1e2540"}`, cursor:"pointer",
            }}>
              <div style={{width:20,height:20,borderRadius:6,flexShrink:0,
                border:`2px solid ${sel?c:"#3d4460"}`, background:sel?c:"transparent",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                {sel && <span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:2}}>
                  <span style={{fontFamily:"monospace",fontSize:12,color:c,fontWeight:700,
                    background:c+"18",padding:"1px 5px",borderRadius:4}}>{code.cpt}</span>
                  {isExempt(code.cpt) && <span style={{fontSize:10,color:"#94a3b8",background:"#94a3b815",
                    border:"1px solid #94a3b830",borderRadius:4,padding:"1px 5px",fontWeight:600}}>exempt</span>}
                  {search && <span style={{fontSize:10,color:c,background:c+"15",
                    border:`1px solid ${c}33`,borderRadius:4,padding:"1px 5px",fontWeight:600}}>{code.catLabel}</span>}
                </div>
                <div style={{fontSize:13,color:sel?"#e2e8f0":"#94a3b8",lineHeight:1.3}}>{code.desc}</div>
                {code.note && <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{code.note}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:16,fontWeight:800,color:sel?c:"#3d4460"}}>{code.wRVU.toFixed(2)}</div>
                <div style={{fontSize:9,color:"#475569",textTransform:"uppercase",letterSpacing:0.5}}>wRVU</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  // ── DAY LOG VIEW ──────────────────────────────────────────────────────
  const DayLogView = () => (
    <div style={{padding:"12px 12px 0", paddingBottom:160}}>
      {dayLog.length === 0 ? (
        <div style={{textAlign:"center",padding:"48px 24px",color:"#475569"}}>
          <div style={{fontSize:36,marginBottom:12}}>📋</div>
          <div style={{fontSize:15,color:"#64748b",fontWeight:600}}>No cases logged yet</div>
          <div style={{fontSize:13,color:"#475569",marginTop:6}}>
            Select procedures in the Calculator tab, then tap "Add to Day"
          </div>
        </div>
      ) : (
        <>
          {/* Day summary card */}
          <div style={{background:"linear-gradient(135deg,#1a1d2e,#1e2540)",border:"1px solid #2d3348",
            borderRadius:14,padding:"16px",marginBottom:14}}>
            <div style={{fontSize:10,color:"#64748b",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
              Day Total · {dayLog.length} case{dayLog.length!==1?"s":""}
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
              <span style={{fontSize:40,fontWeight:900,lineHeight:1,
                background:"linear-gradient(90deg,#10b981,#6366f1)",
                WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
                {dayTotalEffective.toFixed(2)}
              </span>
              <span style={{fontSize:13,color:"#10b981",fontWeight:700}}>eff. wRVU</span>
            </div>
            {Math.abs(dayTotalRaw-dayTotalEffective)>0.001 && (
              <div style={{fontSize:12,color:"#64748b",marginBottom:8}}>
                <span style={{textDecoration:"line-through",marginRight:6}}>{dayTotalRaw.toFixed(2)} gross</span>
                <span style={{color:"#f59e0b"}}>−{(dayTotalRaw-dayTotalEffective).toFixed(2)} reductions</span>
              </div>
            )}
            <div style={{display:"flex",gap:16,marginTop:4}}>
              <div>
                <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Medicare</div>
                <div style={{fontSize:16,fontWeight:800,color:"#10b981"}}>{fmt(dayTotalEffective*CF)}</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:1}}>Comp @ ${compRate}</div>
                <div style={{fontSize:16,fontWeight:800,color:"#818cf8"}}>{fmt(dayTotalEffective*compRate)}</div>
              </div>
            </div>
          </div>

          {/* Individual cases */}
          {dayLog.map((cas, idx) => {
            const ann = computeReduction(cas.codes);
            const effRVU = ann.reduce((s,c)=>s+c.wRVU*c.multiplier, 0);
            const rawRVU = cas.codes.reduce((s,c)=>s+c.wRVU, 0);
            const red = rawRVU - effRVU;
            return (
              <div key={cas.id} style={{background:"#13162a",border:"1px solid #1e2540",
                borderRadius:12,marginBottom:8,overflow:"hidden"}}>
                {/* Case header */}
                <div style={{display:"flex",alignItems:"center",padding:"10px 14px",
                  borderBottom:"1px solid #1e2540",gap:10}}>
                  <div style={{width:22,height:22,borderRadius:6,background:"#1e2540",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,fontWeight:800,color:"#64748b",flexShrink:0}}>
                    {idx+1}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{cas.label}</div>
                    <div style={{fontSize:11,color:"#475569"}}>{cas.codes.length} procedure{cas.codes.length!==1?"s":""}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:16,fontWeight:900,color:"#10b981"}}>{effRVU.toFixed(2)}</div>
                    <div style={{fontSize:9,color:"#475569",textTransform:"uppercase"}}>eff. wRVU</div>
                  </div>
                  <button onClick={()=>removeCase(cas.id)} style={{
                    background:"none",border:"1px solid #3d4460",color:"#64748b",
                    borderRadius:6,padding:"3px 7px",fontSize:12,cursor:"pointer",flexShrink:0}}>✕</button>
                </div>

                {/* Code rows */}
                {ann.map((code,i) => {
                  const roleInfo = ROLE_LABELS[code.role]||ROLE_LABELS.primary;
                  const eff = code.wRVU*code.multiplier;
                  return (
                    <div key={code.cpt} style={{display:"flex",alignItems:"center",gap:6,
                      padding:"7px 14px",borderBottom:i<ann.length-1?"1px solid #0d0f1a":"none",
                      background:i%2===0?"#0d0f1a22":"transparent"}}>
                      <span style={{fontFamily:"monospace",fontSize:11,color:code.color,
                        fontWeight:700,width:56,flexShrink:0}}>{code.cpt}</span>
                      <span style={{fontSize:10,fontWeight:700,color:roleInfo.color,background:roleInfo.bg,
                        border:`1px solid ${roleInfo.color}44`,borderRadius:4,padding:"0 4px",flexShrink:0}}>{roleInfo.label}</span>
                      <span style={{flex:1,fontSize:11,color:"#64748b",overflow:"hidden",
                        textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{code.desc}</span>
                      <span style={{fontSize:12,fontWeight:700,color:"#94a3b8",flexShrink:0}}>{code.wRVU.toFixed(2)}</span>
                      <span style={{fontSize:11,color:"#475569",flexShrink:0}}>×{code.multiplier===1?"1":".5"}</span>
                      <span style={{fontSize:13,fontWeight:800,color:code.multiplier===1?"#e2e8f0":"#f59e0b",
                        width:36,textAlign:"right",flexShrink:0}}>{eff.toFixed(2)}</span>
                    </div>
                  );
                })}

                {/* Case subtotal */}
                {red > 0.001 && (
                  <div style={{display:"flex",justifyContent:"space-between",padding:"6px 14px",
                    background:"#1a1d2e",borderTop:"1px solid #1e2540",fontSize:11}}>
                    <span style={{color:"#64748b"}}>Gross {rawRVU.toFixed(2)} · reduction −{red.toFixed(2)}</span>
                    <span style={{color:"#10b981",fontWeight:700}}>{effRVU.toFixed(2)} eff.</span>
                  </div>
                )}
              </div>
            );
          })}

          {/* Reset day button */}
          {confirmClear ? (
            <div style={{display:"flex",gap:8,marginTop:4,marginBottom:8}}>
              <button onClick={resetDay} style={{flex:1,background:"#7f1d1d",border:"1px solid #ef4444",
                color:"#fca5a5",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                Yes, reset day
              </button>
              <button onClick={()=>setConfirmClear(false)} style={{flex:1,background:"#1a1d2e",
                border:"1px solid #2d3348",color:"#64748b",borderRadius:10,padding:"10px",fontSize:13,cursor:"pointer"}}>
                Cancel
              </button>
            </div>
          ) : (
            <button onClick={()=>setConfirmClear(true)} style={{width:"100%",marginTop:4,marginBottom:8,
              background:"#1a1d2e",border:"1px solid #2d3348",color:"#64748b",
              borderRadius:10,padding:"10px",fontSize:13,cursor:"pointer"}}>
              Reset day log
            </button>
          )}
        </>
      )}
    </div>
  );

  // ── RENDER ────────────────────────────────────────────────────────────
  return (
    <div style={{background:"#0d0f1a",minHeight:"100vh",color:"#e2e8f0",
      fontFamily:"system-ui,-apple-system,sans-serif",maxWidth:480,margin:"0 auto"}}>

      {/* HEADER with tab switcher */}
      <div style={{background:"#13162a",borderBottom:"1px solid #1e2540",padding:"14px 16px 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div>
            <div style={{fontSize:19,fontWeight:800,letterSpacing:-0.3,color:"#f1f5f9"}}>GI wRVU Calculator</div>
            <div style={{fontSize:11,color:"#475569",marginTop:1}}>CMS 2026 · Medicare multiple procedure reduction</div>
          </div>
          {dayLog.length > 0 && (
            <div style={{background:"linear-gradient(135deg,#10b981,#6366f1)",borderRadius:8,
              padding:"4px 10px",textAlign:"center"}}>
              <div style={{fontSize:14,fontWeight:900,color:"#fff",lineHeight:1}}>{dayTotalEffective.toFixed(1)}</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:1}}>day</div>
            </div>
          )}
        </div>
        {/* View tabs */}
        <div style={{display:"flex",gap:0}}>
          {[["calc","🔢 Calculator"],["daylog","📋 Day Log"]].map(([v,label]) => (
            <button key={v} onClick={()=>setView(v)} style={{
              flex:1, background:"none", border:"none",
              borderBottom:`2.5px solid ${view===v?"#6366f1":"transparent"}`,
              color:view===v?"#818cf8":"#475569",
              padding:"8px 0", fontSize:13, fontWeight:700, cursor:"pointer",
              transition:"all 0.15s",
            }}>{label}{v==="daylog"&&dayLog.length>0?` (${dayLog.length})`:""}</button>
          ))}
        </div>
      </div>

      {/* PAGE CONTENT */}
      {view === "calc" ? <CalcView /> : <DayLogView />}

      {/* STICKY BOTTOM — only on calc view */}
      {view === "calc" && (
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
          width:"100%",maxWidth:480,background:"#13162a",borderTop:"1px solid #1e2540",
          zIndex:100,boxShadow:"0 -8px 30px #00000066"}}>

          {/* BREAKDOWN DRAWER */}
          {showBreakdown && annotated.length > 0 && (
            <div style={{borderBottom:"1px solid #1e2540",maxHeight:240,overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px 4px"}}>
                <span style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>
                  Current case {hasReduction?"· 50% reduction":""}
                </span>
                <button onClick={()=>setSelected([])} style={{background:"none",border:"1px solid #3d4460",
                  color:"#64748b",borderRadius:6,padding:"2px 8px",fontSize:11,cursor:"pointer"}}>Clear</button>
              </div>
              <div style={{display:"flex",padding:"4px 14px",gap:4,borderBottom:"1px solid #1e2540"}}>
                <div style={{flex:1,fontSize:10,color:"#3d4460",textTransform:"uppercase"}}>Procedure</div>
                <div style={{width:40,textAlign:"right",fontSize:10,color:"#3d4460"}}>Raw</div>
                <div style={{width:28,textAlign:"center",fontSize:10,color:"#3d4460"}}>×</div>
                <div style={{width:46,textAlign:"right",fontSize:10,color:"#3d4460"}}>Eff.</div>
                <div style={{width:16}}/>
              </div>
              {annotated.map((code,i) => {
                const roleInfo = ROLE_LABELS[code.role]||ROLE_LABELS.primary;
                const eff = code.wRVU*code.multiplier;
                return (
                  <div key={code.cpt} style={{padding:"7px 14px",
                    borderBottom:i<annotated.length-1?"1px solid #1a1d2e":"none",
                    background:i%2===0?"#0d0f1a33":"transparent"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                      <span style={{fontFamily:"monospace",fontSize:11,color:code.color,fontWeight:700}}>{code.cpt}</span>
                      <span style={{fontSize:10,fontWeight:700,color:roleInfo.color,background:roleInfo.bg,
                        border:`1px solid ${roleInfo.color}44`,borderRadius:4,padding:"0 4px"}}>{roleInfo.label}</span>
                      <span style={{flex:1,fontSize:11,color:"#64748b",overflow:"hidden",
                        textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{code.desc}</span>
                      <button onClick={e=>{e.stopPropagation();toggle(code.cpt);}} style={{
                        background:"none",border:"none",color:"#475569",fontSize:15,cursor:"pointer",padding:0,lineHeight:1}}>×</button>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <div style={{flex:1}}/>
                      <div style={{width:40,textAlign:"right"}}><span style={{fontSize:13,fontWeight:700,color:"#94a3b8"}}>{code.wRVU.toFixed(2)}</span></div>
                      <div style={{width:28,textAlign:"center"}}><span style={{fontSize:12,fontWeight:800,color:code.multiplier===1?"#10b981":"#f59e0b"}}>×{code.multiplier===1?"1":".5"}</span></div>
                      <div style={{width:46,textAlign:"right"}}><span style={{fontSize:14,fontWeight:900,color:code.multiplier===1?"#e2e8f0":"#f59e0b"}}>{eff.toFixed(2)}</span></div>
                      <div style={{width:16}}/>
                    </div>
                  </div>
                );
              })}
              <div style={{background:"#1a1d2e",borderTop:"1px solid #2d3348"}}>
                {hasReduction && (
                  <div style={{display:"flex",justifyContent:"space-between",padding:"5px 14px 2px"}}>
                    <span style={{fontSize:11,color:"#64748b"}}>Gross {totalRaw.toFixed(2)} · reduction −{(totalRaw-totalEffective).toFixed(2)}</span>
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 14px 8px"}}>
                  <span style={{fontSize:12,fontWeight:800,color:"#e2e8f0"}}>Case Total</span>
                  <span style={{fontSize:15,fontWeight:900,color:"#10b981"}}>{totalEffective.toFixed(2)} eff. wRVU</span>
                </div>
              </div>
            </div>
          )}

          {/* SETTINGS DRAWER */}
          {showSettings && (
            <div style={{padding:"12px 16px 10px",borderBottom:"1px solid #1e2540"}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>
                Compensation Rate: <span style={{color:"#e2e8f0",fontWeight:700}}>${compRate}/wRVU</span>
              </div>
              <input type="range" min={45} max={90} value={compRate}
                onChange={e=>setCompRate(Number(e.target.value))} style={{width:"100%"}} />
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#475569",marginTop:4}}>
                <span>$45</span><span style={{color:"#6366f1"}}>Median: $61 (MGMA 2025)</span><span>$90</span>
              </div>
            </div>
          )}

          {/* MAIN BOTTOM BAR */}
          <div style={{padding:"8px 12px 6px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {/* Totals */}
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"baseline",gap:4}}>
                  <span style={{fontSize:28,fontWeight:900,lineHeight:1,
                    background:currentDisplay>0?"linear-gradient(90deg,#10b981,#6366f1)":"none",
                    color:currentDisplay>0?"transparent":"#2d3348",
                    WebkitBackgroundClip:currentDisplay>0?"text":"none",
                    WebkitTextFillColor:currentDisplay>0?"transparent":"#2d3348"}}>
                    {currentDisplay.toFixed(2)}
                  </span>
                  <span style={{fontSize:11,color:hasReduction?"#10b981":"#475569",fontWeight:700}}>
                    {hasReduction?"eff. wRVU":"wRVU"}
                  </span>
                </div>
                {hasReduction && (
                  <div style={{fontSize:11,color:"#64748b"}}>
                    <span style={{textDecoration:"line-through",marginRight:4}}>{totalRaw.toFixed(2)}</span>
                    <span style={{color:"#f59e0b"}}>−{(totalRaw-totalEffective).toFixed(2)}</span>
                  </div>
                )}
                {currentDisplay>0 && (
                  <div style={{display:"flex",gap:8,marginTop:1,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:"#10b981",fontWeight:600}}>{fmt(currentDisplay*CF)} Medicare</span>
                    <span style={{fontSize:10,color:"#818cf8",fontWeight:600}}>{fmt(currentDisplay*compRate)} comp</span>
                  </div>
                )}
              </div>

              {/* Action buttons */}
              <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
                {/* Breakdown */}
                <button onClick={()=>{setShowBreakdown(p=>!p);setShowSettings(false);}} style={{
                  position:"relative", background:showBreakdown?"#1e2540":"#1a1d2e",
                  border:`1.5px solid ${showBreakdown?"#6366f1":"#2d3348"}`,
                  color:showBreakdown?"#818cf8":"#64748b",
                  borderRadius:10,padding:"7px 10px",cursor:"pointer",fontSize:15,lineHeight:1}}>
                  📋
                  {annotated.length>0 && <span style={{position:"absolute",top:-6,right:-6,
                    background:"#6366f1",color:"#fff",borderRadius:"50%",width:16,height:16,
                    fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {annotated.length}</span>}
                </button>

                {/* Add to Day */}
                <button onClick={addToDay} disabled={selectedDetails.length===0} style={{
                  background:selectedDetails.length>0?"linear-gradient(135deg,#10b981,#059669)":"#1a1d2e",
                  border:`1.5px solid ${selectedDetails.length>0?"#10b981":"#2d3348"}`,
                  color:selectedDetails.length>0?"#fff":"#3d4460",
                  borderRadius:10,padding:"7px 11px",cursor:selectedDetails.length>0?"pointer":"not-allowed",
                  fontSize:12,fontWeight:700,lineHeight:1.2,whiteSpace:"nowrap"}}>
                  + Day
                </button>

                {/* Settings */}
                <button onClick={()=>{setShowSettings(p=>!p);setShowBreakdown(false);}} style={{
                  background:showSettings?"#1e2540":"#1a1d2e",
                  border:`1.5px solid ${showSettings?"#f59e0b":"#2d3348"}`,
                  color:showSettings?"#f59e0b":"#64748b",
                  borderRadius:10,padding:"7px 10px",cursor:"pointer",fontSize:15,lineHeight:1}}>⚙️</button>
              </div>
            </div>

            {/* Case label input — shown when procedures selected */}
            {selectedDetails.length>0 && (
              <div style={{marginTop:8,display:"flex",gap:6}}>
                <input value={caseLabel} onChange={e=>setCaseLabel(e.target.value)}
                  placeholder={`Case label (e.g. "ERCP Rm 3") — optional`}
                  style={{flex:1,background:"#1a1d2e",border:"1px solid #2d3348",borderRadius:8,
                    padding:"7px 10px",color:"#e2e8f0",fontSize:12,outline:"none"}} />
              </div>
            )}
          </div>

          <div style={{height:"env(safe-area-inset-bottom, 8px)"}}/>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
